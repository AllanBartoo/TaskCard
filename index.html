<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Todo Card</title>
  </head>
  <body>
    <article data-testid="test-todo-card" aria-label="Todo item">
      <!-- View Mode -->
      <div class="tast-view">
        <div class="task-header">
          <span
            data-testid="test-todo-priority"
            aria-label="High priority"
            class="task-priority priority-high priority-text"
          >
            <span class="dot" data-testid="test-todo-priority-indicator"></span>
            <span>High</span>
          </span>
          <span
            id="todo-status-badge"
            class="status-pending"
            data-testid="test-todo-status"
            aria-label="Status: Pending"
          >
            Pending
          </span>

          <select
            id="todo-status"
            class="input input-pending"
            data-testid="test-todo-status-control"
          >
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>

        <h2 id="task-title" data-testid="test-todo-title">
          Finish Frontend Wizards Task
        </h2>

        <div data-testid="test-todo-collapsible-section">
          <p
            id="task-description"
            data-testid="test-todo-description"
            class="task-description collapsed"
          >
            Build a responsive and accessible todo card with proper test IDs.
          </p>
          <button
            class="btn-expand"
            id="expand-btn"
            data-testid="test-todo-expand-toggle"
            aria-expanded="false"
            aria-controls="task-description"
          >
            Show more
          </button>
        </div>

        <div class="task-meta">
          <time
            id="due-date"
            data-testid="test-todo-due-date"
            datetime="2026-04-20T18:00:00Z"
          >
            Due April 17, 2026
          </time>

          <span
            class="task-time-remaining task-time-remaining--overdue"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            id="time-remaining"
          >
            Due in 3 days
          </span>

          <span
            id="overdue-indicator"
            data-testid="test-todo-overdue-indicator"
            class="overdue-indicator"
            aria-label="Task is overdue"
          >
            Overdue
          </span>
        </div>

        <ul class="task-tags" data-testid="test-todo-tags" aria-label="Tags">
          <li data-testid="test-todo-tag-work">
            <span> work </span>
          </li>
          <li data-testid="test-todo-tag-urgent">
            <span> urgent </span>
          </li>
        </ul>

        <div class="task-footer">
          <label class="task-checkbox">
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
            />
            <span class="task-checkbox__label">Mark as complete</span>
          </label>
          <div class="task-cta">
            <button
              class="btn btn--edit"
              data-testid="test-todo-edit-button"
              aria-label="Edit task"
            >
              Edit
            </button>
            <button
              class="btn btn--delete"
              data-testid="test-todo-delete-button"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </div>
      </div>

      <!-- Edit Mode -->
      <div class="task-edit hidden">
        <h2>Edit Task</h2>
        <form action="#" data-testid="test-todo-edit-form">
          <div class="form-group">
            <label for="title-input">Title</label>
            <input
              id="title-input"
              class="input"
              type="text"
              data-testid="test-todo-edit-title-input"
              placeholder="Enter the title"
            />
          </div>

          <div class="form-group">
            <label for="description-input">Description</label>
            <textarea
              id="description-input"
              class="input"
              data-testid="test-todo-edit-description-input"
              placeholder="Enter the description"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="priority-input">Priority</label>
            <select
              id="priority-input"
              class="input"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="date-input">Due Date</label>
            <input
              class="input"
              type="date"
              id="date-input"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>

          <div class="edit-footer">
            <div class="task-cta">
              <button
                id="save--btn"
                class="btn btn--save"
                data-testid="test-todo-save-button"
                aria-label="Edit task"
              >
                Save
              </button>
              <button
                id="cancel--btn"
                class="btn btn--cancel"
                data-testid="test-todo-cancel-button"
                aria-label="Delete task"
              >
                Cancel
              </button>
            </div>
          </div>
        </form>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
